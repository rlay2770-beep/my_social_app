<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Social App</title>
    
    <!-- React & ReactDOM (CDNs) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel JS -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen">

    <!-- React App Root Container -->
    <div id="root"></div>

    <!-- React Application Logic -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // User State
            const [currentUser, setCurrentUser] = useState({
                id: "user_001",
                name: "NextGen User",
                bio: "Welcome to my NextGen Social Profile!",
                gender: "Male",
                country: "Myanmar",
                website: "https://nextgen.app",
                avatar: "N"
            });

            // Navigation & Feed States
            const [activeTab, setActiveTab] = useState('feed'); 
            const [feedType, setFeedType] = useState('news');
            
            // UI States
            const [isEditProfileOpen, setIsEditProfileOpen] = useState(false);
            const [newPostText, setNewPostText] = useState('');
            const [commentInputs, setCommentInputs] = useState({});
            const [activeCommentPostId, setActiveCommentPostId] = useState(null);
            const [editFormData, setEditFormData] = useState({ ...currentUser });
            const [toastMessage, setToastMessage] = useState('');

            // Clean Default Posts (စမ်းသပ်စာသားများ ဖယ်ရှားထားသည်)
            const [posts, setPosts] = useState([
                {
                    id: "post_welcome",
                    author: "NextGen Team",
                    avatar: "N",
                    time: "ယနေ့",
                    content: "Welcome to NextGen Social! မင်္ဂလာပါ၊ သင်၏ စာများကို စတင် မျှဝေနိုင်ပါပြီ။ 🚀",
                    likedBy: [], 
                    comments: []
                }
            ]);

            // Re-render Icons
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeTab, posts, isEditProfileOpen, activeCommentPostId]);

            // Toast Alert Auto Hide
            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(''), 3000);
            };

            // 1. Like / Unlike Toggle
            const handleLikeToggle = (postId) => {
                setPosts(prevPosts =>
                    prevPosts.map(post => {
                        if (post.id === postId) {
                            const hasLiked = post.likedBy.includes(currentUser.id);
                            const updatedLikedBy = hasLiked
                                ? post.likedBy.filter(id => id !== currentUser.id)
                                : [...post.likedBy, currentUser.id];
                            return { ...post, likedBy: updatedLikedBy };
                        }
                        return post;
                    })
                );
            };

            // 2. Add New Post
            const handleCreatePost = (e) => {
                if (e) e.preventDefault();
                if (!newPostText.trim()) return;

                const newPost = {
                    id: `post_${Date.now()}`,
                    author: currentUser.name,
                    avatar: currentUser.avatar,
                    time: "ယခုလေးတင်",
                    content: newPostText,
                    likedBy: [],
                    comments: []
                };

                setPosts([newPost, ...posts]);
                setNewPostText('');
            };

            // 3. Add Comment
            const handleAddComment = (postId) => {
                const text = commentInputs[postId];
                if (!text || !text.trim()) return;

                setPosts(prevPosts =>
                    prevPosts.map(post => {
                        if (post.id === postId) {
                            return {
                                ...post,
                                comments: [
                                    ...post.comments,
                                    { id: `comm_${Date.now()}`, author: currentUser.name, text: text.trim() }
                                ]
                            };
                        }
                        return post;
                    })
                );

                setCommentInputs({ ...commentInputs, [postId]: '' });
            };

            // 4. Share Functionality
            const handleShare = (post) => {
                if (navigator.share) {
                    navigator.share({
                        title: 'NextGen Post',
                        text: post.content,
                        url: window.location.href,
                    }).catch(() => {});
                } else {
                    navigator.clipboard.writeText(window.location.href);
                    showToast("Post Link ကို Copy ကူးလိုက်ပါပြီ။");
                }
            };

            // 5. Save Profile
            const handleSaveProfile = (e) => {
                e.preventDefault();
                setCurrentUser({ ...editFormData });
                setIsEditProfileOpen(false);
                showToast("Profile ပြင်ဆင်မှု အောင်မြင်ပါသည်။");
            };

            return (
                <div className="flex flex-col items-center min-h-screen relative">
                    
                    {/* Toast Notification */}
                    {toastMessage && (
                        <div className="fixed top-4 bg-slate-900 text-white px-4 py-2 rounded-lg text-xs font-medium shadow-lg z-50 animate-bounce">
                            {toastMessage}
                        </div>
                    )}

                    {/* Header */}
                    <header className="w-full max-w-2xl bg-white border-b border-slate-200 sticky top-0 z-10 px-4 py-3 flex justify-between items-center shadow-sm">
                        <h1 className="text-xl font-bold text-indigo-600 tracking-wide">NextGen</h1>
                        <nav className="flex space-x-1 sm:space-x-4">
                            <button 
                                onClick={() => setActiveTab('feed')}
                                className={`px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1 transition ${activeTab === 'feed' ? 'bg-indigo-50 text-indigo-600' : 'text-slate-600 hover:bg-slate-50'}`}
                            >
                                <i data-lucide="home" className="w-4 h-4"></i> Feeds
                            </button>
                            <button 
                                onClick={() => setActiveTab('explore')}
                                className={`px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1 transition ${activeTab === 'explore' ? 'bg-indigo-50 text-indigo-600' : 'text-slate-600 hover:bg-slate-50'}`}
                            >
                                <i data-lucide="compass" className="w-4 h-4"></i> Explore
                            </button>
                            <button 
                                onClick={() => setActiveTab('profile')}
                                className={`px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1 transition ${activeTab === 'profile' ? 'bg-indigo-50 text-indigo-600' : 'text-slate-600 hover:bg-slate-50'}`}
                            >
                                <i data-lucide="user" className="w-4 h-4"></i> Profile
                            </button>
                        </nav>
                    </header>

                    {/* Main Container */}
                    <main className="w-full max-w-2xl p-4 flex-1">
                        
                        {/* FEEDS TAB */}
                        {activeTab === 'feed' && (
                            <div className="space-y-4">
                                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                                    <div className="flex gap-3 items-center mb-3">
                                        <div className="w-10 h-10 rounded-full bg-indigo-600 text-white font-bold flex items-center justify-center">
                                            {currentUser.avatar}
                                        </div>
                                        <input 
                                            type="text"
                                            placeholder="ဘာတွေ စဉ်းစားနေလဲ... ?"
                                            value={newPostText}
                                            onChange={(e) => setNewPostText(e.target.value)}
                                            onKeyDown={(e) => e.key === 'Enter' && handleCreatePost(e)}
                                            className="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                        />
                                    </div>
                                    <div className="flex justify-between items-center pt-2 border-t border-slate-100">
                                        <div className="flex gap-2 text-xs font-semibold">
                                            <button 
                                                onClick={() => setFeedType('news')}
                                                className={`px-3 py-1 rounded-full ${feedType === 'news' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600'}`}
                                            >
                                                News Feed
                                            </button>
                                            <button 
                                                onClick={() => setFeedType('live')}
                                                className={`px-3 py-1 rounded-full ${feedType === 'live' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600'}`}
                                            >
                                                Live Feed
                                            </button>
                                        </div>
                                        <button 
                                            onClick={handleCreatePost}
                                            className="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-4 py-2 rounded-lg transition"
                                        >
                                            Post
                                        </button>
                                    </div>
                                </div>

                                {/* Posts List */}
                                {posts.map(post => {
                                    const isLiked = post.likedBy.includes(currentUser.id);
                                    const isCommentOpen = activeCommentPostId === post.id;

                                    return (
                                        <div key={post.id} className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 space-y-3">
                                            <div className="flex items-center gap-3">
                                                <div className="w-9 h-9 rounded-full bg-indigo-600 text-white font-bold flex items-center justify-center text-sm">
                                                    {post.avatar}
                                                </div>
                                                <div>
                                                    <h4 className="font-semibold text-sm text-slate-900">{post.author}</h4>
                                                    <p className="text-xs text-slate-400">{post.time}</p>
                                                </div>
                                            </div>

                                            <p className="text-sm text-slate-700 whitespace-pre-line leading-relaxed">{post.content}</p>

                                            <div className="flex items-center gap-6 pt-2 border-t border-slate-100 text-xs font-medium text-slate-500">
                                                <button 
                                                    onClick={() => handleLikeToggle(post.id)}
                                                    className={`flex items-center gap-1.5 transition ${isLiked ? 'text-red-500 font-bold' : 'hover:text-slate-800'}`}
                                                >
                                                    <i data-lucide="heart" className="w-4 h-4"></i>
                                                    Like ({post.likedBy.length})
                                                </button>

                                                <button 
                                                    onClick={() => setActiveCommentPostId(isCommentOpen ? null : post.id)}
                                                    className="flex items-center gap-1.5 hover:text-slate-800 transition"
                                                >
                                                    <i data-lucide="message-circle" className="w-4 h-4"></i>
                                                    Comment ({post.comments.length})
                                                </button>

                                                <button 
                                                    onClick={() => handleShare(post)}
                                                    className="flex items-center gap-1.5 hover:text-slate-800 transition"
                                                >
                                                    <i data-lucide="share-2" className="w-4 h-4"></i> Share
                                                </button>
                                            </div>

                                            {/* Comments Section */}
                                            {isCommentOpen && (
                                                <div className="pt-3 border-t border-slate-100 space-y-3">
                                                    {post.comments.map(c => (
                                                        <div key={c.id} className="bg-slate-50 p-2.5 rounded-lg text-xs space-y-1">
                                                            <span className="font-bold text-slate-800">{c.author}: </span>
                                                            <span className="text-slate-600">{c.text}</span>
                                                        </div>
                                                    ))}

                                                    <div className="flex gap-2">
                                                        <input 
                                                            type="text" 
                                                            placeholder="ကွန်မန့်ရေးရန်..."
                                                            value={commentInputs[post.id] || ''}
                                                            onChange={(e) => setCommentInputs({ ...commentInputs, [post.id]: e.target.value })}
                                                            onKeyDown={(e) => e.key === 'Enter' && handleAddComment(post.id)}
                                                            className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-indigo-500"
                                                        />
                                                        <button 
                                                            onClick={() => handleAddComment(post.id)}
                                                            className="bg-indigo-600 text-white p-2 rounded-lg hover:bg-indigo-700 transition flex items-center justify-center"
                                                        >
                                                            <i data-lucide="send" className="w-3.5 h-3.5"></i>
                                                        </button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* EXPLORE TAB */}
                        {activeTab === 'explore' && (
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 space-y-4">
                                <h2 className="text-lg font-bold text-slate-800">Explore Trends</h2>
                                <p className="text-xs text-slate-500">နောက်ဆုံးရ Trending ခေါင်းစဉ်များ</p>
                                
                                <div className="space-y-3 pt-2">
                                    <div className="p-3 bg-slate-50 rounded-lg border border-slate-100 flex justify-between items-center cursor-pointer hover:bg-slate-100 transition">
                                        <div>
                                            <p className="text-xs text-slate-400">Trending in Myanmar</p>
                                            <p className="font-semibold text-sm text-indigo-600">#NextGenSocial</p>
                                        </div>
                                        <span className="text-xs text-slate-400">1.2K Posts</span>
                                    </div>
                                    <div className="p-3 bg-slate-50 rounded-lg border border-slate-100 flex justify-between items-center cursor-pointer hover:bg-slate-100 transition">
                                        <div>
                                            <p className="text-xs text-slate-400">Technology</p>
                                            <p className="font-semibold text-sm text-indigo-600">#WebDevelopment</p>
                                        </div>
                                        <span className="text-xs text-slate-400">850 Posts</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* PROFILE TAB */}
                        {activeTab === 'profile' && (
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 space-y-6">
                                <div className="flex justify-between items-start">
                                    <div className="flex gap-4 items-center">
                                        <div className="w-16 h-16 rounded-full bg-indigo-600 text-white font-bold text-2xl flex items-center justify-center">
                                            {currentUser.avatar}
                                        </div>
                                        <div>
                                            <h2 className="text-xl font-bold text-slate-900">{currentUser.name}</h2>
                                            <p className="text-xs text-slate-500 mt-1">{currentUser.bio}</p>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => {
                                            setEditFormData({ ...currentUser });
                                            setIsEditProfileOpen(true);
                                        }}
                                        className="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-semibold px-3 py-2 rounded-lg flex items-center gap-1.5 transition"
                                    >
                                        <i data-lucide="edit-3" className="w-3.5 h-3.5"></i> Edit Profile
                                    </button>
                                </div>

                                <div className="grid grid-cols-2 gap-4 text-xs pt-4 border-t border-slate-100">
                                    <div>
                                        <span className="text-slate-400">Gender</span>
                                        <p className="font-semibold text-slate-700 mt-0.5">{currentUser.gender}</p>
                                    </div>
                                    <div>
                                        <span className="text-slate-400">Country</span>
                                        <p className="font-semibold text-slate-700 mt-0.5 flex items-center gap-1">
                                            <i data-lucide="map-pin" className="w-3 h-3"></i> {currentUser.country}
                                        </p>
                                    </div>
                                    <div className="col-span-2">
                                        <span className="text-slate-400">Website</span>
                                        <p className="font-semibold text-indigo-600 mt-0.5 flex items-center gap-1">
                                            <i data-lucide="globe" className="w-3 h-3"></i> <a href={currentUser.website} target="_blank" rel="noreferrer">{currentUser.website}</a>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* EDIT PROFILE MODAL */}
                    {isEditProfileOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex justify-center items-center z-50 p-4">
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-md p-6 space-y-4">
                                <div className="flex justify-between items-center border-b border-slate-100 pb-3">
                                    <h3 className="font-bold text-slate-800">Edit Profile</h3>
                                    <button onClick={() => setIsEditProfileOpen(false)} className="text-slate-400 hover:text-slate-600">
                                        <i data-lucide="x" className="w-4 h-4"></i>
                                    </button>
                                </div>

                                <form onSubmit={handleSaveProfile} className="space-y-3 text-xs">
                                    <div>
                                        <label className="block text-slate-600 font-medium mb-1">Name</label>
                                        <input 
                                            type="text" 
                                            value={editFormData.name}
                                            onChange={(e) => setEditFormData({ ...editFormData, name: e.target.value })}
                                            className="w-full border border-slate-200 rounded-lg p-2 focus:ring-1 focus:ring-indigo-500 focus:outline-none"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-slate-600 font-medium mb-1">Bio</label>
                                        <textarea 
                                            rows="2"
                                            value={editFormData.bio}
                                            onChange={(e) => setEditFormData({ ...editFormData, bio: e.target.value })}
                                            className="w-full border border-slate-200 rounded-lg p-2 focus:ring-1 focus:ring-indigo-500 focus:outline-none"
                                        ></textarea>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-slate-600 font-medium mb-1">Gender</label>
                                            <select 
                                                value={editFormData.gender}
                                                onChange={(e) => setEditFormData({ ...editFormData, gender: e.target.value })}
                                                className="w-full border border-slate-200 rounded-lg p-2 focus:ring-1 focus:ring-indigo-500 focus:outline-none bg-white"
                                            >
                                                <option value="Male">Male</option>
                                                <option value="Female">Female</option>
                                                <option value="Other">Other</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-slate-600 font-medium mb-1">Country</label>
                                            <input 
                                                type="text" 
                                                value={editFormData.country}
                                                onChange={(e) => setEditFormData({ ...editFormData, country: e.target.value })}
                                                className="w-full border border-slate-200 rounded-lg p-2 focus:ring-1 focus:ring-indigo-500 focus:outline-none"
                                            />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-slate-600 font-medium mb-1">Website</label>
                                        <input 
                                            type="text" 
                                            value={editFormData.website}
                                            onChange={(e) => setEditFormData({ ...editFormData, website: e.target.value })}
                                            className="w-full border border-slate-200 rounded-lg p-2 focus:ring-1 focus:ring-indigo-500 focus:outline-none"
                                        />
                                    </div>

                                    <div className="flex justify-end gap-2 pt-3 border-t border-slate-100">
                                        <button 
                                            type="button"
                                            onClick={() => setIsEditProfileOpen(false)}
                                            className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg font-medium"
                                        >
                                            Cancel
                                        </button>
                                        <button 
                                            type="submit"
                                            className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium"
                                        >
                                            Save Changes
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
