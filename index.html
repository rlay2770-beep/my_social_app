<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Social</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen relative">

    <div class="flex flex-col items-center min-h-screen pb-16">
        <!-- Toast Notification -->
        <div id="toast" class="hidden fixed top-4 bg-slate-900 text-white px-4 py-2 rounded-lg text-xs font-medium shadow-lg z-50 animate-bounce"></div>

        <!-- Header Navbar -->
        <header class="w-full max-w-2xl bg-white border-b border-slate-200 sticky top-0 z-10 px-4 py-3 flex justify-between items-center shadow-sm">
            <h1 class="text-xl font-bold text-indigo-600 tracking-wide cursor-pointer" onclick="switchTab('feed')">NextGen</h1>
            <nav class="flex space-x-2">
                <button id="btn-feed" onclick="switchTab('feed')" class="px-3 py-1.5 rounded-lg text-sm font-medium transition bg-indigo-50 text-indigo-600">Feeds</button>
                <button id="btn-explore" onclick="switchTab('explore')" class="px-3 py-1.5 rounded-lg text-sm font-medium transition text-slate-600">Explore</button>
                <button id="btn-profile" onclick="switchTab('profile')" class="px-3 py-1.5 rounded-lg text-sm font-medium transition text-slate-600">Profile</button>
            </nav>
        </header>

        <main class="w-full max-w-2xl p-4 flex-1">
            
            <!-- FEEDS SECTION -->
            <div id="tab-feed" class="space-y-4">
                <!-- Create Post Box -->
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 space-y-3">
                    <div class="flex gap-3 items-center">
                        <div id="user-avatar-badge" class="w-10 h-10 rounded-full bg-indigo-600 text-white font-bold flex items-center justify-center overflow-hidden flex-shrink-0">N</div>
                        <input id="post-input" type="text" placeholder="ဘာတွေ စဉ်းစားနေလဲ... ? (@ ဖြင့် သူငယ်ချင်း Tag ပါ)" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>

                    <!-- Tag Friends Quick Selector -->
                    <div class="flex items-center gap-2 text-xs text-slate-500 bg-slate-50 p-2 rounded-lg border border-slate-100">
                        <span class="font-semibold text-indigo-600">Tag Friends:</span>
                        <button onclick="addTag('@AungAung')" class="bg-white border px-2 py-0.5 rounded hover:bg-indigo-50">+ @AungAung</button>
                        <button onclick="addTag('@SuSu')" class="bg-white border px-2 py-0.5 rounded hover:bg-indigo-50">+ @SuSu</button>
                    </div>

                    <!-- Media Preview Area -->
                    <div id="media-preview-container" class="hidden relative rounded-lg overflow-hidden border border-slate-200 bg-black max-h-60 flex justify-center items-center">
                        <img id="image-preview" class="hidden max-h-60 object-contain" />
                        <video id="video-preview" controls class="hidden max-h-60"></video>
                        <button onclick="removeMedia()" class="absolute top-2 right-2 bg-slate-900/80 text-white px-2 py-1 rounded-full text-xs">✕ Remove</button>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100">
                        <div class="flex gap-2">
                            <label class="text-xs font-semibold px-3 py-1 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 cursor-pointer">
                                📷 Photo/Video
                                <input type="file" id="media-file-input" accept="image/*,video/*" onchange="handleFileSelect(event)" class="hidden">
                            </label>
                        </div>
                        <button onclick="createPost()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-4 py-1.5 rounded-lg transition">Post</button>
                    </div>
                </div>

                <!-- Posts List Container -->
                <div id="posts-container" class="space-y-4"></div>
            </div>

            <!-- EXPLORE SECTION -->
            <div id="tab-explore" class="hidden bg-white p-6 rounded-xl shadow-sm border border-slate-200 space-y-4">
                <h2 class="text-lg font-bold text-slate-800">Explore Trends</h2>
                <p class="text-xs text-slate-500">Trending ခေါင်းစဉ်များ</p>
                <div class="p-3 bg-slate-50 rounded-lg border border-slate-100 flex justify-between items-center cursor-pointer hover:bg-indigo-50 transition" onclick="switchTab('feed')">
                    <div>
                        <p class="text-xs text-slate-400">Trending in Myanmar</p>
                        <p class="font-semibold text-sm text-indigo-600">#NextGenSocial</p>
                    </div>
                    <span class="text-xs text-slate-400">1.2K Posts</span>
                </div>
            </div>

            <!-- PROFILE SECTION -->
            <div id="tab-profile" class="hidden bg-white p-6 rounded-xl shadow-sm border border-slate-200 space-y-6">
                <div class="flex justify-between items-start">
                    <div class="flex gap-4 items-center">
                        <div id="profile-page-avatar" class="w-16 h-16 rounded-full bg-indigo-600 text-white font-bold text-2xl flex items-center justify-center border-2 border-indigo-600 overflow-hidden flex-shrink-0">N</div>
                        <div>
                            <h2 id="profile-name-display" class="text-xl font-bold text-slate-900">NextGen User</h2>
                            <p id="profile-bio-display" class="text-xs text-slate-500 mt-1">Welcome to NextGen Social!</p>
                        </div>
                    </div>
                    <button onclick="openEditProfile()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-semibold px-3 py-1.5 rounded-lg">Edit Profile</button>
                </div>

                <div class="grid grid-cols-2 gap-4 text-xs pt-4 border-t border-slate-100">
                    <div><span class="text-slate-400 block">Gender</span><span id="profile-gender-display" class="font-semibold text-slate-700">Male</span></div>
                    <div><span class="text-slate-400 block">Country</span><span id="profile-country-display" class="font-semibold text-slate-700">Myanmar</span></div>
                </div>
            </div>
        </main>

        <!-- FLOATING CHAT WIDGET (စကားပြောရန်) -->
        <div class="fixed bottom-4 right-4 z-40">
            <button onclick="toggleChat()" class="bg-indigo-600 text-white p-3.5 rounded-full shadow-lg hover:bg-indigo-700 transition flex items-center justify-center">
                💬
            </button>
        </div>

        <!-- CHAT BOX MODAL -->
        <div id="chat-box" class="hidden fixed bottom-16 right-4 w-80 bg-white rounded-xl shadow-2xl border border-slate-200 z-50 flex flex-col overflow-hidden h-96">
            <div class="bg-indigo-600 text-white p-3 font-semibold text-sm flex justify-between items-center">
                <span>NextGen Direct Chat</span>
                <button onclick="toggleChat()" class="text-white hover:text-slate-200">✕</button>
            </div>
            <div id="chat-messages" class="flex-1 p-3 overflow-y-auto space-y-2 text-xs bg-slate-50">
                <div class="bg-white p-2 rounded-lg border border-slate-200 text-slate-600 max-w-[80%]">
                    <b>NextGen Bot:</b> မင်္ဂလာပါ! စကားပြောလိုသော သူငယ်ချင်းအား ရှာဖွေ၍ စာပို့နိုင်ပါသည်။
                </div>
            </div>
            <div class="p-2 bg-white border-t border-slate-200 flex gap-1">
                <input id="chat-input" type="text" placeholder="စာရေးရန်..." onkeydown="if(event.key==='Enter') sendChatMessage()" class="w-full bg-slate-100 rounded-lg px-3 py-1.5 text-xs focus:outline-none">
                <button onclick="sendChatMessage()" class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-xs font-semibold">Send</button>
            </div>
        </div>

        <!-- EDIT PROFILE MODAL -->
        <div id="edit-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex justify-center items-center z-50 p-4">
            <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6 space-y-4">
                <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                    <h3 class="font-bold text-slate-800">Edit Profile</h3>
                    <button onclick="closeEditProfile()" class="text-slate-400">✕</button>
                </div>
                <div class="space-y-3 text-xs">
                    <div>
                        <label class="block text-slate-600 font-medium mb-1">Profile Picture</label>
                        <input type="file" id="avatar-input" accept="image/*" class="w-full text-xs text-slate-500 border border-slate-200 rounded-lg p-1.5" />
                    </div>
                    <div>
                        <label class="block text-slate-600 font-medium mb-1">Name</label>
                        <input type="text" id="edit-name" class="w-full border border-slate-200 rounded-lg p-2" />
                    </div>
                    <div>
                        <label class="block text-slate-600 font-medium mb-1">Bio</label>
                        <textarea id="edit-bio" rows="2" class="w-full border border-slate-200 rounded-lg p-2"></textarea>
                    </div>
                    <div class="flex justify-end gap-2 pt-3 border-t border-slate-100">
                        <button onclick="closeEditProfile()" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg">Cancel</button>
                        <button onclick="saveProfile()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg">Save Changes</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // State Management with LocalStorage
        let currentUser = JSON.parse(localStorage.getItem('ng_user')) || {
            name: "NextGen User",
            bio: "Welcome to NextGen Social!",
            gender: "Male",
            country: "Myanmar",
            avatarUrl: null
        };

        let posts = JSON.parse(localStorage.getItem('ng_posts')) || [
            {
                id: "p1",
                author: "NextGen Team",
                time: "ယနေ့",
                content: "မင်္ဂလာပါ! NextGen Social မှ ကြိုဆိုပါတယ်။ #NextGenSocial",
                mediaUrl: null,
                mediaType: null,
                likes: 1,
                comments: []
            }
        ];

        let selectedMediaData = null;
        let selectedMediaType = null;

        window.onload = function() {
            renderProfile();
            renderPosts();
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2500);
        }

        function switchTab(tabName) {
            document.getElementById('tab-feed').classList.add('hidden');
            document.getElementById('tab-explore').classList.add('hidden');
            document.getElementById('tab-profile').classList.add('hidden');

            document.getElementById('btn-feed').className = "px-3 py-1.5 rounded-lg text-sm font-medium transition text-slate-600";
            document.getElementById('btn-explore').className = "px-3 py-1.5 rounded-lg text-sm font-medium transition text-slate-600";
            document.getElementById('btn-profile').className = "px-3 py-1.5 rounded-lg text-sm font-medium transition text-slate-600";

            document.getElementById('tab-' + tabName).classList.remove('hidden');
            document.getElementById('btn-' + tabName).className = "px-3 py-1.5 rounded-lg text-sm font-medium transition bg-indigo-50 text-indigo-600";
        }

        function renderProfile() {
            document.getElementById('profile-name-display').innerText = currentUser.name;
            document.getElementById('profile-bio-display').innerText = currentUser.bio;
            
            const badge = document.getElementById('user-avatar-badge');
            const profileAvatar = document.getElementById('profile-page-avatar');

            if(currentUser.avatarUrl) {
                badge.innerHTML = `<img src="${currentUser.avatarUrl}" class="w-full h-full object-cover"/>`;
                profileAvatar.innerHTML = `<img src="${currentUser.avatarUrl}" class="w-full h-full object-cover"/>`;
            } else {
                badge.innerHTML = currentUser.name.charAt(0);
                profileAvatar.innerHTML = currentUser.name.charAt(0);
            }
        }

        function addTag(username) {
            const input = document.getElementById('post-input');
            input.value = input.value ? input.value + " " + username : username;
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedMediaData = e.target.result;
                    selectedMediaType = file.type.startsWith('video/') ? 'video' : 'image';
                    
                    document.getElementById('media-preview-container').classList.remove('hidden');
                    if (selectedMediaType === 'image') {
                        document.getElementById('image-preview').src = selectedMediaData;
                        document.getElementById('image-preview').classList.remove('hidden');
                        document.getElementById('video-preview').classList.add('hidden');
                    } else {
                        document.getElementById('video-preview').src = selectedMediaData;
                        document.getElementById('video-preview').classList.remove('hidden');
                        document.getElementById('image-preview').classList.add('hidden');
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        function removeMedia() {
            selectedMediaData = null;
            selectedMediaType = null;
            document.getElementById('media-file-input').value = '';
            document.getElementById('media-preview-container').classList.add('hidden');
        }

        function createPost() {
            const input = document.getElementById('post-input');
            const text = input.value.trim();
            if (!text && !selectedMediaData) return;

            const newPost = {
                id: 'p_' + Date.now(),
                author: currentUser.name,
                avatarUrl: currentUser.avatarUrl,
                time: "ယခုလေးတင်",
                content: text,
                mediaUrl: selectedMediaData,
                mediaType: selectedMediaType,
                likes: 0,
                comments: []
            };

            posts.unshift(newPost);
            localStorage.setItem('ng_posts', JSON.stringify(posts));

            input.value = '';
            removeMedia();
            renderPosts();
            showToast("Post တင်ပြီးပါပြီ။");
        }

        function deletePost(id) {
            if (confirm("ဒီ Post ကို ဖျက်ရန် သေချာပါသလား?")) {
                posts = posts.filter(p => p.id !== id);
                localStorage.setItem('ng_posts', JSON.stringify(posts));
                renderPosts();
                showToast("Post ကို ဖျက်လိုက်ပါပြီ။");
            }
        }

        function renderPosts() {
            const container = document.getElementById('posts-container');
            container.innerHTML = '';

            posts.forEach(post => {
                let mediaHTML = '';
                if(post.mediaUrl) {
                    if(post.mediaType === 'image') {
                        mediaHTML = `<div class="rounded-lg overflow-hidden border border-slate-100 max-h-80 bg-black flex justify-center"><img src="${post.mediaUrl}" class="w-full max-h-80 object-cover"/></div>`;
                    } else {
                        mediaHTML = `<div class="rounded-lg overflow-hidden border border-slate-100 max-h-80 bg-black flex justify-center"><video src="${post.mediaUrl}" controls class="w-full max-h-80"></video></div>`;
                    }
                }

                let avatarHTML = post.avatarUrl 
                    ? `<img src="${post.avatarUrl}" class="w-9 h-9 rounded-full object-cover"/>`
                    : `<div class="w-9 h-9 rounded-full bg-indigo-600 text-white font-bold flex items-center justify-center text-sm">${post.author.charAt(0)}</div>`;

                // Highlight Tagged Users
                let formattedContent = post.content.replace(/(@\w+)/g, '<span class="text-indigo-600 font-semibold cursor-pointer">$1</span>');

                // Render Comments List
                let commentsHTML = post.comments.map(c => `
                    <div class="bg-slate-50 p-2 rounded-lg text-xs">
                        <span class="font-bold text-slate-800">${c.author}: </span>
                        <span class="text-slate-600">${c.text}</span>
                    </div>
                `).join('');

                const postEl = document.createElement('div');
                postEl.className = "bg-white p-4 rounded-xl shadow-sm border border-slate-200 space-y-3";
                postEl.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            ${avatarHTML}
                            <div>
                                <h4 class="font-semibold text-sm text-slate-900">${post.author}</h4>
                                <p class="text-xs text-slate-400">${post.time}</p>
                            </div>
                        </div>
                        <button onclick="deletePost('${post.id}')" class="text-xs text-red-400 hover:text-red-600 p-1">🗑️</button>
                    </div>

                    <p class="text-sm text-slate-700 leading-relaxed">${formattedContent}</p>
                    ${mediaHTML}

                    <div class="flex items-center gap-6 pt-2 border-t border-slate-100 text-xs font-medium text-slate-500">
                        <button onclick="likePost('${post.id}')" class="hover:text-red-500 transition">❤️ Like (${post.likes})</button>
                        <button onclick="toggleCommentBox('${post.id}')" class="hover:text-indigo-600 transition">💬 Comment (${post.comments.length})</button>
                        <button onclick="sharePost('${post.id}')" class="hover:text-indigo-600 transition">🔗 Share</button>
                    </div>

                    <!-- Comment Input & List -->
                    <div id="comment-box-${post.id}" class="hidden space-y-2 pt-2 border-t border-slate-100">
                        <div id="comments-list-${post.id}" class="space-y-1">${commentsHTML}</div>
                        <div class="flex gap-2">
                            <input id="comment-input-${post.id}" type="text" placeholder="ကွန်မန့်ရေးရန်..." onkeydown="if(event.key==='Enter') addComment('${post.id}')" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-xs focus:outline-none">
                            <button onclick="addComment('${post.id}')" class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-xs">Send</button>
                        </div>
                    </div>
                `;
                container.appendChild(postEl);
            });
        }

        function likePost(id) {
            posts = posts.map(p => p.id === id ? {...p, likes: p.likes + 1} : p);
            localStorage.setItem('ng_posts', JSON.stringify(posts));
            renderPosts();
        }

        function toggleCommentBox(id) {
            const box = document.getElementById(`comment-box-${id}`);
            box.classList.toggle('hidden');
        }

        function addComment(id) {
            const input = document.getElementById(`comment-input-${id}`);
            const text = input.value.trim();
            if(!text) return;

            posts = posts.map(p => {
                if(p.id === id) {
                    return {...p, comments: [...p.comments, { author: currentUser.name, text: text }]};
                }
                return p;
            });

            localStorage.setItem('ng_posts', JSON.stringify(posts));
            renderPosts();
            document.getElementById(`comment-box-${id}`).classList.remove('hidden');
        }

        function sharePost(id) {
            navigator.clipboard.writeText(window.location.href);
            showToast("Post Link ကို Copy ကူးပြီးပါပြီ။");
        }

        // CHAT WIDGET LOGIC
        function toggleChat() {
            document.getElementById('chat-box').classList.toggle('hidden');
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;

            const msgContainer = document.getElementById('chat-messages');
            msgContainer.innerHTML += `
                <div class="bg-indigo-600 text-white p-2 rounded-lg text-xs max-w-[80%] ml-auto">
                    ${text}
                </div>
            `;
            input.value = '';
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }

        // PROFILE EDIT LOGIC
        function openEditProfile() {
            document.getElementById('edit-name').value = currentUser.name;
            document.getElementById('edit-bio').value = currentUser.bio;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeEditProfile() {
            document.getElementById('edit-modal').classList.add('hidden');
        }

        function saveProfile() {
            currentUser.name = document.getElementById('edit-name').value;
            currentUser.bio = document.getElementById('edit-bio').value;

            const avatarFile = document.getElementById('avatar-input').files[0];
            if(avatarFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentUser.avatarUrl = e.target.result;
                    localStorage.setItem('ng_user', JSON.stringify(currentUser));
                    renderProfile();
                    closeEditProfile();
                    showToast("Profile ကို ပြင်ဆင်ပြီးပါပြီ။");
                };
                reader.readAsDataURL(avatarFile);
            } else {
                localStorage.setItem('ng_user', JSON.stringify(currentUser));
                renderProfile();
                closeEditProfile();
                showToast("Profile ကို ပြင်ဆင်ပြီးပါပြီ။");
            }
        }
    </script>
</body>
</html>
