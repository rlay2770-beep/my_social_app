<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextGen Social Platform - Phase 1</title>

  <!-- Tailwind CSS (Styling အတွက်) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">

  <!-- Header / Navigation Bar -->
  <header class="bg-white shadow sticky top-0 z-40 px-4 py-3 flex justify-between items-center max-w-4xl mx-auto rounded-b-lg">
    <h1 class="text-2xl font-bold text-blue-600 tracking-wide">NextGen</h1>
    <div id="authArea" class="flex gap-2">
      <!-- Auth Buttons / User Profile Avatar dynamic ဝင်လာမည် -->
      <button onclick="openProfileModal()" class="hidden id-user-profile bg-blue-50 text-blue-600 px-3 py-1.5 rounded-full font-medium hover:bg-blue-100 transition">
        👤 My Profile
      </button>
    </div>
  </header>

  <!-- Main Container -->
  <main class="max-w-xl mx-auto mt-6 px-4 pb-20">
    
    <!-- Profile Card Preview (Profile ဖြည့်ထားသည်များ ပြသရန်) -->
    <div id="profileDisplayCard" class="hidden bg-white rounded-2xl shadow-md overflow-hidden mb-6 border border-gray-100">
      <div class="h-32 bg-gradient-to-r from-blue-500 to-indigo-600 relative" id="coverDisplay">
        <!-- Cover Photo -->
      </div>
      <div class="p-4 relative pt-0">
        <div class="-mt-12 mb-3 flex justify-between items-end">
          <div class="w-20 h-20 bg-white p-1 rounded-full shadow">
            <div id="avatarDisplay" class="w-full h-full bg-blue-500 rounded-full flex items-center justify-center text-white font-bold text-xl">
              U
            </div>
          </div>
          <button onclick="openProfileModal()" class="text-sm bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg border font-semibold">
            ⚙️ Edit Profile
          </button>
        </div>
        <h2 id="userNameDisplay" class="text-xl font-bold text-gray-900">User Name</h2>
        <p id="userRoleBadge" class="text-xs inline-block bg-blue-100 text-blue-800 font-semibold px-2 py-0.5 rounded mt-1">User</p>
        <p id="bioDisplay" class="text-gray-600 mt-2 text-sm">Bio မရှိသေးပါ။ Profile ပြင်ဆင်ရန် နှိပ်ပါ။</p>
        
        <div class="mt-3 text-xs text-gray-500 grid grid-cols-2 gap-2 border-t pt-2">
          <p>🌍 Country: <span id="countryDisplay" class="font-medium text-gray-700">Myanmar</span></p>
          <p>⚧️ Gender: <span id="genderDisplay" class="font-medium text-gray-700">Unspecified</span></p>
          <p class="col-span-2">🔗 Web: <a id="websiteDisplay" href="#" target="_blank" class="text-blue-500 underline">None</a></p>
        </div>
      </div>
    </div>

    <!-- Feed / Posts Section -->
    <h3 class="font-bold text-gray-700 mb-3 text-lg">Feeds</h3>
    
    <!-- Sample Post Card with Real Share & Role Security -->
    <div class="bg-white p-4 rounded-xl shadow mb-4 border border-gray-100">
      <div class="flex justify-between items-start mb-2">
        <div class="flex items-center gap-2">
          <div class="w-9 h-9 bg-indigo-500 text-white rounded-full flex items-center justify-center font-bold">A</div>
          <div>
            <h4 class="font-bold text-sm">NextGen Admin</h4>
            <p class="text-xs text-gray-400">Just now</p>
          </div>
        </div>
        <!-- Delete Button (Only active/visible if Security Allows) -->
        <button onclick="deletePost('post_001', 'admin_uid_here')" class="text-xs text-red-500 hover:underline bg-red-50 px-2 py-1 rounded">
          🗑️ Delete
        </button>
      </div>

      <p class="text-gray-800 my-3 text-sm leading-relaxed">
        Welcome to NextGen Social Platform! Phase 1 Update မှာ Admin Security, Real Profile တွေနဲ့ Share System ပါဝင်လာပါပြီ။ 🚀
      </p>

      <!-- Post Actions -->
      <div class="flex border-t pt-2 mt-2 justify-between text-xs font-semibold text-gray-500">
        <button class="hover:text-blue-600 flex items-center gap-1">👍 Like</button>
        <button class="hover:text-blue-600 flex items-center gap-1">💬 Comment</button>
        <!-- Real Share Button -->
        <button onclick="sharePost('post_001', 'NextGen Welcome Post')" class="hover:text-blue-600 flex items-center gap-1 text-blue-600 bg-blue-50 px-3 py-1 rounded-full">
          🔗 Share
        </button>
      </div>
    </div>

  </main>

  <!-- ---------------- MODAL SECTION ---------------- -->

  <!-- Profile Edit Modal -->
  <div id="profileModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden">
    <div class="bg-white w-full max-w-md rounded-2xl p-6 shadow-2xl relative max-h-[90vh] overflow-y-auto">
      <h3 class="text-xl font-bold mb-4 text-gray-800">Edit Profile</h3>
      
      <form id="profileForm" onsubmit="saveProfile(event)" class="space-y-4 text-sm">
        <div>
          <label class="block font-medium mb-1">Cover Photo URL</label>
          <input type="url" id="inputCover" placeholder="https://example.com/cover.jpg" class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div>
          <label class="block font-medium mb-1">Bio</label>
          <textarea id="inputBio" rows="2" placeholder="Tell something about yourself..." class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block font-medium mb-1">Gender</label>
            <select id="inputGender" class="w-full border p-2 rounded-lg outline-none">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div>
            <label class="block font-medium mb-1">Country</label>
            <input type="text" id="inputCountry" placeholder="Myanmar" class="w-full border p-2 rounded-lg outline-none">
          </div>
        </div>

        <div>
          <label class="block font-medium mb-1">Website</label>
          <input type="url" id="inputWebsite" placeholder="https://mywebsite.com" class="w-full border p-2 rounded-lg outline-none">
        </div>

        <div class="flex gap-2 pt-2">
          <button type="button" onclick="closeProfileModal()" class="w-1/2 bg-gray-200 text-gray-700 py-2 rounded-lg font-semibold hover:bg-gray-300">Cancel</button>
          <button type="submit" class="w-1/2 bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ---------------- FIREBASE & LOGIC SCRIPT ---------------- -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ⚠️ မိမိ Firebase Console မှ Config ဖြင့် အစားထိုးပါ
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserData = null;

    // 1. Auth State Monitoring
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        document.querySelectorAll('.id-user-profile').forEach(el => el.classList.remove('hidden'));
        document.getElementById('profileDisplayCard').classList.remove('hidden');
        await loadUserProfile(user.uid);
      } else {
        console.log("No user logged in.");
      }
    });

    // 2. Load User Profile from Firestore
    async function loadUserProfile(uid) {
      try {
        const userRef = doc(db, "users", uid);
        const docSnap = await getDoc(userRef);

        if (docSnap.exists()) {
          currentUserData = docSnap.data();
          renderProfile(currentUserData);
        } else {
          // New User Setup Default Data
          const defaultData = {
            displayName: auth.currentUser.displayName || "User",
            role: "user", // Admin PIN မသုံးတော့ဘဲ Role ကို DB ထဲစစ်မည်
            bio: "Welcome to my NextGen profile!",
            country: "Myanmar",
            gender: "Not Specified",
            website: "",
            coverPhoto: ""
          };
          await setDoc(userRef, defaultData);
          currentUserData = defaultData;
          renderProfile(defaultData);
        }
      } catch (err) {
        console.error("Error loading profile:", err);
      }
    }

    // UI Rendering Helper
    function renderProfile(data) {
      document.getElementById('userNameDisplay').innerText = data.displayName || "User";
      document.getElementById('bioDisplay').innerText = data.bio || "No bio set.";
      document.getElementById('countryDisplay').innerText = data.country || "Myanmar";
      document.getElementById('genderDisplay').innerText = data.gender || "Unspecified";
      document.getElementById('userRoleBadge').innerText = data.role.toUpperCase();
      
      const webEl = document.getElementById('websiteDisplay');
      if (data.website) {
        webEl.href = data.website;
        webEl.innerText = data.website;
      } else {
        webEl.innerText = "None";
      }

      if (data.coverPhoto) {
        document.getElementById('coverDisplay').style.backgroundImage = `url('${data.coverPhoto}')`;
        document.getElementById('coverDisplay').style.backgroundSize = "cover";
      }
    }

    // 3. Save Profile Update Logic
    window.saveProfile = async function(event) {
      event.preventDefault();
      const user = auth.currentUser;
      if (!user) return alert("Please log in first!");

      const updatedData = {
        coverPhoto: document.getElementById('inputCover').value,
        bio: document.getElementById('inputBio').value,
        gender: document.getElementById('inputGender').value,
        country: document.getElementById('inputCountry').value,
        website: document.getElementById('inputWebsite').value
      };

      try {
        await updateDoc(doc(db, "users", user.uid), updatedData);
        alert("✅ Profile updated successfully!");
        closeProfileModal();
        loadUserProfile(user.uid);
      } catch (err) {
        console.error("Profile Save Error:", err);
        alert("Failed to update profile!");
      }
    };

    // 4. Secure Delete Function (Role-based Validation)
    window.deletePost = async function(postId, authorId) {
      const user = auth.currentUser;
      if (!user) return alert("Access denied!");

      // Security Check: Post owner သို့မဟုတ် Admin သာ ဖျက်ခွင့်ရှိမည်
      const isAdmin = currentUserData && currentUserData.role === "admin";
      const isOwner = user.uid === authorId;

      if (!isAdmin && !isOwner) {
        alert("⛔ ခွင့်ပြုချက်မရှိပါ။ မိမိ ပို့စ် သို့မဟုတ် Admin သာ ဖျက်ခွင့်ရှိပါသည်။");
        return;
      }

      if (confirm("ဒီပို့စ်ကို အမှန်တကယ် ဖျက်မှာ သေချာပါသလား?")) {
        // Firestore Delete Logic...
        alert(`Post ${postId} deleted successfully.`);
      }
    };

    // 5. Real Share System (Web Share API / Clipboard)
    window.sharePost = async function(postId, title) {
      const shareUrl = `${window.location.origin}?post=${postId}`;

      if (navigator.share) {
        try {
          await navigator.share({
            title: title,
            text: 'Check out this post on NextGen Platform!',
            url: shareUrl
          });
        } catch (err) {
          if (err.name !== 'AbortError') console.error('Share Error:', err);
        }
      } else {
        try {
          await navigator.clipboard.writeText(shareUrl);
          alert("📌 Post Link ကို Clipboard သို့ Copy ကူးပြီးပါပြီ!");
        } catch (err) {
          prompt("Post Link ကို Copy ကူးပါ:", shareUrl);
        }
      }
    };

    // Modal Helpers
    window.openProfileModal = function() {
      if (currentUserData) {
        document.getElementById('inputCover').value = currentUserData.coverPhoto || "";
        document.getElementById('inputBio').value = currentUserData.bio || "";
        document.getElementById('inputGender').value = currentUserData.gender || "Male";
        document.getElementById('inputCountry').value = currentUserData.country || "Myanmar";
        document.getElementById('inputWebsite').value = currentUserData.website || "";
      }
      document.getElementById('profileModal').classList.remove('hidden');
    };

    window.closeProfileModal = function() {
      document.getElementById('profileModal').classList.add('hidden');
    };
  </script>
</body>
          </html>
