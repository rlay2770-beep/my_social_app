<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Social App</title>
    
    <!-- React & ReactDOM (CDNs) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel JS -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase App & Firestore (v9 Compatibility) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- FIREBASE CONFIGURATION ---
        // အစ်ကို့ရဲ့ ကိုယ်ပိုင် Firebase Config ရှိပါက ဒီနေရာမှာ အစားထိုးနိုင်ပါသည်။
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "nextgen-app.firebaseapp.com",
            projectId: "nextgen-app",
            storageBucket: "nextgen-app.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        // Firebase Initialize (Fallback to LocalStorage if Firebase fails)
        let db = null;
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.firestore();
        } catch (e) {
            console.warn("Firebase initialized in Local/Offline fallback mode.");
        }

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(true);

            // Profile State with Custom Avatar Support
            const [currentUser, setCurrentUser] = useState(() => {
                const saved = localStorage.getItem('nextgen_user');
                return saved ? JSON.parse(saved) : {
                    id: "user_001",
                    name: "NextGen User",
                    bio: "Welcome to my NextGen Social Profile!",
                    gender: "Male",
                    country: "Myanmar",
                    website: "https://nextgen.app",
                    avatarUrl: null, // Custom Image URL or Base64
                    avatarInitial: "N"
                };
            });

            // Navigation & Feed States
            const [activeTab, setActiveTab] = useState('feed'); 
            const [feedType, setFeedType] = useState('news');
            const [selectedHashtag, setSelectedHashtag] = useState(null);
            
            // Post Form States
            const [isEditProfileOpen, setIsEditProfileOpen] = useState(false);
            const [newPostText, setNewPostText] = useState('');
            const [mediaFile, setMediaFile] = useState(null);
            const [mediaType, setMediaType] = useState(null); 
            const [selectedAudio, setSelectedAudio] = useState(''); // Background Music

            const [commentInputs, setCommentInputs] = useState({});
            const [activeCommentPostId, setActiveCommentPostId] = useState(null);
            const [editFormData, setEditFormData] = useState({ ...currentUser });
            const [toastMessage, setToastMessage] = useState('');

            // Preset Audio Tracks for Video/Photo Sync
            const availableAudios = [
                { id: "track1", name: "🎵 Trending Pop Beat" },
                { id: "track2", name: "🎶 Chill Lo-Fi Vibe" },
                { id: "track3", name: "🎸 Acoustic Guitar Melody" }
            ];

            // Posts State
            const [posts, setPosts] = useState(() => {
                const saved = localStorage.getItem('nextgen_posts');
                return saved ? JSON.parse(saved) : [
                    {
                        id: "post_welcome",
                        author: "NextGen Team",
                        avatarInitial: "N",
                        avatarUrl: null,
                        time: "ယနေ့",
                        content: "Welcome to NextGen Social! မင်္ဂလာပါ၊ သင်၏ စာများကို စတင် မျှဝေနိုင်ပါပြီ။ #NextGenSocial 🚀",
                        mediaUrl: null,
                        mediaType: null,
                        audioTrack: null,
                        likedBy: [], 
                        comments: []
                    }
                ];
            });

            // Sync with LocalStorage / Firestore
            useEffect(() => {
                localStorage.setItem('nextgen_posts', JSON.stringify(posts));
                localStorage.setItem('nextgen_user', JSON.stringify(currentUser));
            }, [posts, currentUser]);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeTab, posts, isEditProfileOpen, activeCommentPostId, isLoggedIn, mediaFile]);

            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(''), 3000);
            };

            // Photo/Video File Input
            const handleMediaChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setMediaFile(reader.result);
                        setMediaType(file.type.startsWith('video/') ? 'video' : 'image');
                    };
                    reader.readAsDataURL(file);
                }
            };

            // Avatar Upload Input
            const handleAvatarChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setEditFormData({ ...editFormData, avatarUrl: reader.result });
                    };
                    reader.readAsDataURL(file);
                }
            };

            // Like Toggle
            const handleLikeToggle = (postId) => {
                if (!isLoggedIn) return showToast("Like ပေးရန် အကောင့်ဝင်ပါ");
                setPosts(prev => prev.map(p => {
                    if (p.id === postId) {
                        const hasLiked = p.likedBy.includes(currentUser.id);
                        return {
                            ...p,
                            likedBy: hasLiked ? p.likedBy.filter(id => id !== currentUser.id) : [...p.likedBy, currentUser.id]
                        };
                    }
                    return p;
                }));
            };

            // Create Post
            const handleCreatePost = (e) => {
                if (e) e.preventDefault();
                if (!isLoggedIn) return showToast("Post တင်ရန် အကောင့်ဝင်ပါ");
                if (!newPostText.trim() && !mediaFile) return;

                const newPost = {
                    id: `post_${Date.now()}`,
                    author: currentUser.name,
                    avatarInitial: currentUser.avatarInitial,
                    avatarUrl: currentUser.avatarUrl,
                    time: "ယခုလေးတင်",
                    content: newPostText,
                    mediaUrl: mediaFile,
                    mediaType: mediaType,
                    audioTrack: selectedAudio ? availableAudios.find(a => a.id === selectedAudio)?.name : null,
                    likedBy: [],
                    comments: []
                };

                setPosts([newPost, ...posts]);
                setNewPostText('');
                setMediaFile(null);
                setMediaType(null);
                setSelectedAudio('');
                showToast("Post တင်ပြီးပါပြီ။");
            };

            // Add Comment
            const handleAddComment = (postId) => {
                if (!isLoggedIn) return showToast("ကွန်မန့်ရေးရန် အကောင့်ဝင်ပါ");
                const text = commentInputs[postId];
                if (!text || !text.trim()) return;

                setPosts(prev => prev.map(p => {
                    if (p.id === postId) {
                        return {
                            ...p,
                            comments: [...p.comments, { id: `comm_${Date.now()}`, author: currentUser.name, text: text.trim() }]
                        };
                    }
                    return p;
                }));
                setCommentInputs({ ...commentInputs, [postId]: '' });
            };

            // Save Profile
            const handleSaveProfile = (e) => {
                e.preventDefault();
                setCurrentUser({ ...editFormData });
                setIsEditProfileOpen(false);
                showToast("Profile ပြင်ဆင်ပြီးပါပြီ။");
            };

            const displayedPosts = selectedHashtag 
                ? posts.filter(p => p.content.includes(selectedHashtag))
                : posts;

            return (
                <div className="flex flex-col items-center min-h-screen relative">
                    
                    {toastMessage && (
                        <div className="fixed top-4 bg-slate-900 text-white px-4 py-2 rounded-lg text-xs font-medium shadow-lg z-50 animate-bounce">
                            {toastMessage}
                        </div>
                    )}

                    {/* Header */}
                    <header className="w-full max-w-2xl bg-white border-b border-slate-200 sticky top-0 z-10 px-4 py-3 flex justify-between items-center shadow-sm">
                        <h1 className="text-xl font-bold text-indigo-600 tracking-wide cursor-pointer" onClick={() => { setSelectedHashtag(null); setActiveTab('feed'); }}>NextGen</h1>
                        <nav className="flex space-x-1 sm:space-x-4">
                            <button onClick={() => { setSelectedHashtag(null); setActiveTab('feed'); }} className={`px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1 transition ${activeTab === 'feed' ? 'bg-indigo-50 text-indigo-600' : 'text-slate-600'}`}>
                                <i data-lucide="home" className="w-4 h-4"></i> Feeds
                            </button>
                            <button onClick={() => setActiveTab('explore')} className={`px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1 transition ${activeTab === 'explore' ? 'bg-indigo-50 text-indigo-600' : 'text-slate-600'}`}>
                                <i data-lucide="compass" className="w-4 h-4"></i> Explore
                            </button>
                            <button onClick={() => setActiveTab('profile')} className={`px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1 transition ${activeTab === 'profile' ? 'bg-indigo-50 text-indigo-600' : 'text-slate-600'}`}>
                                <i data-lucide="user" className="w-4 h-4"></i> Profile
                            </button>
                        </nav>
                    </header>

                    <main className="w-full max-w-2xl p-4 flex-1">
                        
                        {/* FEEDS TAB */}
                        {activeTab === 'feed' && (
                            <div className="space-y-4">
                                {selectedHashtag && (
                                    <div className="bg-indigo-50 border border-indigo-100 p-3 rounded-xl flex justify-between items-center text-xs text-indigo-700">
                                        <span>Filtering by: <b>{selectedHashtag}</b></span>
                                        <button onClick={() => setSelectedHashtag(null)} className="font-bold underline">Show All</button>
                                    </div>
                                )}

                                {/* Post Creation Box */}
                                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                                    <div className="flex gap-3 items-center mb-3">
                                        {currentUser.avatarUrl ? (
                                            <img src={currentUser.avatarUrl} className="w-10 h-10 rounded-full object-cover" />
                                        ) : (
                                            <div className="w-10 h-10 rounded-full bg-indigo-600 text-white font-bold flex items-center justify-center">
                                                {isLoggedIn ? currentUser.avatarInitial : "?"}
                                            </div>
                                        )}
                                        <input 
                                            type="text"
                                            disabled={!isLoggedIn}
                                            placeholder={isLoggedIn ? "ဘာတွေ စဉ်းစားနေလဲ... ?" : "စာတင်ရန် ပထမဦးစွာ အကောင့်ဝင်ပါ..."}
                                            value={newPostText}
                                            onChange={(e) => setNewPostText(e.target.value)}
                                            onKeyDown={(e) => e.key === 'Enter' && handleCreatePost(e)}
                                            className="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                        />
                                    </div>

                                    {/* Media & Audio Preview */}
                                    {mediaFile && (
                                        <div className="relative mb-3 rounded-lg overflow-hidden border border-slate-200 max-h-60 bg-black flex items-center justify-center">
                                            {mediaType === 'image' ? (
                                                <img src={mediaFile} className="max-h-60 object-contain" />
                                            ) : (
                                                <video src={mediaFile} controls className="max-h-60" />
                                            )}
                                            <button onClick={() => { setMediaFile(null); setMediaType(null); }} className="absolute top-2 right-2 bg-slate-900/80 text-white p-1 rounded-full">
                                                <i data-lucide="x" className="w-4 h-4"></i>
                                            </button>
                                        </div>
                                    )}

                                    {/* Audio Selector for Media */}
                                    {mediaFile && (
                                        <div className="mb-3 flex items-center gap-2 text-xs bg-slate-50 p-2 rounded-lg border border-slate-200">
                                            <i data-lucide="music" className="w-4 h-4 text-indigo-600"></i>
                                            <select 
                                                value={selectedAudio} 
                                                onChange={(e) => setSelectedAudio(e.target.value)}
                                                className="bg-transparent border-none focus:outline-none text-slate-700 w-full"
                                            >
                                                <option value="">နောက်ခံ သီချင်းရွေးရန် (Optional)</option>
                                                {availableAudios.map(a => (
                                                    <option key={a.id} value={a.id}>{a.name}</option>
                                                ))}
                                            </select>
                                        </div>
                                    )}

                                    <div className="flex justify-between items-center pt-2 border-t border-slate-100">
                                        <div className="flex gap-3 items-center text-xs font-semibold">
                                            <button onClick={() => setFeedType('news')} className={`px-3 py-1 rounded-full ${feedType === 'news' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600'}`}>News Feed</button>
                                            
                                            {isLoggedIn && (
                                                <label className="flex items-center gap-1 text-slate-500 hover:text-indigo-600 cursor-pointer bg-slate-50 px-2.5 py-1 rounded-lg border border-slate-200">
                                                    <i data-lucide="image" className="w-4 h-4 text-emerald-500"></i>
                                                    <span>Photo/Video</span>
                                                    <input type="file" accept="image/*,video/*" onChange={handleMediaChange} className="hidden" />
                                                </label>
                                            )}
                                        </div>

                                        <button onClick={handleCreatePost} disabled={!isLoggedIn} className="bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white text-xs font-semibold px-4 py-2 rounded-lg transition">
                                            Post
                                        </button>
                                    </div>
                                </div>

                                {/* Posts List */}
                                {displayedPosts.map(post => {
                                    const isLiked = post.likedBy.includes(currentUser.id);
                                    const isCommentOpen = activeCommentPostId === post.id;

                                    return (
                                        <div key={post.id} className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 space-y-3">
                                            <div className="flex items-center gap-3">
                                                {post.avatarUrl ? (
                                                    <img src={post.avatarUrl} className="w-9 h-9 rounded-full object-cover" />
                                                ) : (
                                                    <div className="w-9 h-9 rounded-full bg-indigo-600 text-white font-bold flex items-center justify-center text-sm">
                                                        {post.avatarInitial || "N"}
                                                    </div>
                                                )}
                                                <div>
                                                    <h4 className="font-semibold text-sm text-slate-900">{post.author}</h4>
                                                    <p className="text-xs text-slate-400">{post.time}</p>
                                                </div>
                                            </div>

                                            <p className="text-sm text-slate-700 whitespace-pre-line leading-relaxed">{post.content}</p>

                                            {/* Audio Badge */}
                                            {post.audioTrack && (
                                                <div className="inline-flex items-center gap-1.5 px-2.5 py-1 bg-indigo-50 text-indigo-700 rounded-full text-xs font-medium">
                                                    <i data-lucide="disc" className="w-3.5 h-3.5 animate-spin"></i>
                                                    <span>{post.audioTrack}</span>
                                                </div>
                                            )}

                                            {/* Media Rendering */}
                                            {post.mediaUrl && (
                                                <div className="rounded-lg overflow-hidden border border-slate-100 max-h-80 bg-black flex items-center justify-center">
                                                    {post.mediaType === 'image' ? (
                                                        <img src={post.mediaUrl} className="w-full object-cover max-h-80" />
                                                    ) : (
                                                        <video src={post.mediaUrl} controls className="w-full max-h-80" />
                                                    )}
                                                </div>
                                            )}

                                            <div className="flex items-center gap-6 pt-2 border-t border-slate-100 text-xs font-medium text-slate-500">
                                                <button onClick={() => handleLikeToggle(post.id)} className={`flex items-center gap-1.5 transition ${isLiked ? 'text-red-500 font-bold' : 'hover:text-slate-800'}`}>
                                                    <i data-lucide="heart" className="w-4 h-4"></i> Like ({post.likedBy.length})
                                                </button>
                                                <button onClick={() => setActiveCommentPostId(isCommentOpen ? null : post.id)} className="flex items-center gap-1.5 hover:text-slate-800 transition">
                                                    <i data-lucide="message-circle" className="w-4 h-4"></i> Comment ({post.comments.length})
                                                </button>
                                                <button onClick={() => showToast("Link Copied!")} className="flex items-center gap-1.5 hover:text-slate-800 transition">
                                                    <i data-lucide="share-2" className="w-4 h-4"></i> Share
                                                </button>
                                            </div>

                                            {/* Comments Section */}
                                            {isCommentOpen && (
                                                <div className="pt-3 border-t border-slate-100 space-y-3">
                                                    {post.comments.map(c => (
                                                        <div key={c.id} className="bg-slate-50 p-2.5 rounded-lg text-xs space-y-1">
                                                            <span className="font-bold text-slate-800">{c.author}: </span>
                                                            <span className="text-slate-600">{c.text}</span>
                                                        </div>
                                                    ))}

                                                    <div className="flex gap-2">
                                                        <input 
                                                            type="text" 
                                                            disabled={!isLoggedIn}
                                                            placeholder={isLoggedIn ? "ကွန်မန့်ရေးရန်..." : "ကွန်မန့်ရေးရန် အကောင့်ဝင်ပါ..."}
                                                            value={commentInputs[post.id] || ''}
                                                            onChange={(e) => setCommentInputs({ ...commentInputs, [post.id]: e.target.value })}
                                                            onKeyDown={(e) => e.key === 'Enter' && handleAddComment(post.id)}
                                                            className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-indigo-500"
                                                        />
                                                        <button onClick={() => handleAddComment(post.id)} disabled={!isLoggedIn} className="bg-indigo-600 text-white p-2 rounded-lg hover:bg-indigo-700 transition">
                                                            <i data-lucide="send" className="w-3.5 h-3.5"></i>
                                                        </button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* EXPLORE TAB */}
                        {activeTab === 'explore' && (
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 space-y-4">
                                <h2 className="text-lg font-bold text-slate-800">Explore Trends</h2>
                                <p className="text-xs text-slate-500">Trending ခေါင်းစဉ်များကို နှိပ်၍ သီးသန့် စာများကို ရှာဖွေနိုင်ပါသည်</p>
                                
                                <div className="space-y-3 pt-2">
                                    <div onClick={() => { setSelectedHashtag('#NextGenSocial'); setActiveTab('feed'); }} className="p-3 bg-slate-50 rounded-lg border border-slate-100 flex justify-between items-center cursor-pointer hover:bg-indigo-50 transition">
                                        <div>
                                            <p className="text-xs text-slate-400">Trending in Myanmar</p>
                                            <p className="font-semibold text-sm text-indigo-600">#NextGenSocial</p>
                                        </div>
                                        <span className="text-xs text-slate-400">1.2K Posts</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* PROFILE TAB */}
                        {activeTab === 'profile' && (
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 space-y-6">
                                <div className="flex justify-between items-start">
                                    <div className="flex gap-4 items-center">
                                        {currentUser.avatarUrl ? (
                                            <img src={currentUser.avatarUrl} className="w-16 h-16 rounded-full object-cover border-2 border-indigo-600" />
                                        ) : (
                                            <div className="w-16 h-16 rounded-full bg-indigo-600 text-white font-bold text-2xl flex items-center justify-center">
                                                {currentUser.avatarInitial}
                                            </div>
                                        )}
                                        <div>
                                            <h2 className="text-xl font-bold text-slate-900">{currentUser.name}</h2>
                                            <p className="text-xs text-slate-500 mt-1">{currentUser.bio}</p>
                                        </div>
                                    </div>

                                    <div className="flex flex-col gap-2">
                                        <button onClick={() => { setEditFormData({ ...currentUser }); setIsEditProfileOpen(true); }} className="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-semibold px-3 py-1.5 rounded-lg flex items-center gap-1.5">
                                            <i data-lucide="edit-3" className="w-3.5 h-3.5"></i> Edit Profile
                                        </button>
                                        <button onClick={() => setIsLoggedIn(!isLoggedIn)} className="bg-red-50 hover:bg-red-100 text-red-600 text-xs font-semibold px-3 py-1.5 rounded-lg">
                                            {isLoggedIn ? "Logout" : "Log In"}
                                        </button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4 text-xs pt-4 border-t border-slate-100">
                                    <div>
                                        <span className="text-slate-400">Gender</span>
                                        <p className="font-semibold text-slate-700 mt-0.5">{currentUser.gender}</p>
                                    </div>
                                    <div>
                                        <span className="text-slate-400">Country</span>
                                        <p className="font-semibold text-slate-700 mt-0.5">{currentUser.country}</p>
                                    </div>
                                    <div className="col-span-2">
                                        <span className="text-slate-400">Website</span>
                                        <p className="font-semibold text-indigo-600 mt-0.5"><a href={currentUser.website} target="_blank">{currentUser.website}</a></p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* EDIT PROFILE MODAL WITH PICTURE UPLOAD */}
                    {isEditProfileOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex justify-center items-center z-50 p-4">
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-md p-6 space-y-4">
                                <div className="flex justify-between items-center border-b border-slate-100 pb-3">
                                    <h3 className="font-bold text-slate-800">Edit Profile</h3>
                                    <button onClick={() => setIsEditProfileOpen(false)} className="text-slate-400"><i data-lucide="x" className="w-4 h-4"></i></button>
                                </div>

                                <form onSubmit={handleSaveProfile} className="space-y-3 text-xs">
                                    <div>
                                        <label className="block text-slate-600 font-medium mb-1">Profile Picture</label>
                                        <input type="file" accept="image/*" onChange={handleAvatarChange} className="w-full text-xs text-slate-500 border border-slate-200 rounded-lg p-1.5" />
                                    </div>

                                    <div>
                                        <label className="block text-slate-600 font-medium mb-1">Name</label>
                                        <input type="text" value={editFormData.name} onChange={(e) => setEditFormData({ ...editFormData, name: e.target.value })} className="w-full border border-slate-200 rounded-lg p-2 focus:ring-1 focus:ring-indigo-500" />
                                    </div>

                                    <div>
                                        <label className="block text-slate-600 font-medium mb-1">Bio</label>
                                        <textarea rows="2" value={editFormData.bio} onChange={(e) => setEditFormData({ ...editFormData, bio: e.target.value })} className="w-full border border-slate-200 rounded-lg p-2 focus:ring-1 focus:ring-indigo-500"></textarea>
                                    </div>

                                    <div className="flex justify-end gap-2 pt-3 border-t border-slate-100">
                                        <button type="button" onClick={() => setIsEditProfileOpen(false)} className="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg">Cancel</button>
                                        <button type="submit" className="px-4 py-2 bg-indigo-600 text-white rounded-lg">Save Changes</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
